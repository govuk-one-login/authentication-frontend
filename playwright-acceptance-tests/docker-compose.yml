name: pw-acceptance-tests

services:
  proxy:
    image: nginx:alpine
    volumes:
      - ./stubs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "4400:80"
    networks:
      - test-net
    depends_on:
      authentication-frontend:
        condition: service_healthy

  authentication-frontend:
    build:
      context: ../
      dockerfile: dev.Dockerfile
    env_file: ../.env.local
    environment:
      FRONTEND_API_BASE_URL: http://api-stub:8080/
      API_BASE_URL: http://api-stub:8080/
      ORCH_TO_AUTH_AUDIENCE: http://proxy/
      PORT: 4401
    command: "node --enable-source-maps dist/server.js"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4401/healthcheck').then(r=>{if(!r.ok)throw r.status;process.exit(0)}).catch(()=>process.exit(1))",
        ]
      interval: 3s
      retries: 10
      start_period: 15s
    networks:
      - test-net

  api-stub:
    image: outofcoffee/imposter:latest
    volumes:
      - ./stubs/api-stub:/opt/imposter/config
    networks:
      - test-net

  orch-stub-start:
    image: ${ORCH_STUB_IMAGE}
    environment:
      AUTHENTICATION_FRONTEND_URL: http://proxy/
      STUB_URL: http://orch-stub-start:4400/
      RP_CLIENT_ID: local-client-id
      RP_SECTOR_HOST: local-sector-host
      COOKIE_DOMAIN: none
      PRIVATE_KEY: |
        -----BEGIN PRIVATE KEY-----
        MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgSpFQByZAQH3n5lCu
        0L+foxHzwi/I1RtJ4o8jyTtwj4WhRANCAASyFo4Vo28pL3dLQ7YAqsSBlcxUPZFk
        q4YeTPS3lxx53aay6jy6I+V3ZYmr3ZGDnR2JRydsa4kXumn2jvfKOvuW
        -----END PRIVATE KEY-----
      AUTH_PUB_KEY: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAlSYz9jgEkkoW2DPewqcb
        TrZyrcv+rJgN7pocKslRm565icgpg+A2PMr65CAwOcjBQWa/IJben28+jh8PLaPp
        SNH/MExkX6DgOVqlXniMkSFpf51JM1xzFsmFrlYcWTPCdFNVDPLJDhQB9qmcmIPT
        h7ZCC94FLGwt3JiaRkrQP5mMdFEwxd/TwNmNoC52XUAehT0O5/Ii4UoZ7udFAxLV
        F9hX1fegFLwrWrtDZyaH0W+EAfNhN9H7OgLzLWs/YjU7Vbbvk8Mt10mvNFj3ylTg
        6OPvIUfVGUzsolbjXHOhNchBT8ZWdCsrbsrudK1deoJXONXEZM5NyCTECOIldxko
        hwIDAQAB
        -----END PUBLIC KEY-----
    networks:
      - test-net

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      BASE_URL: http://proxy/
      BROWSER: chromium
      HEADLESS: "true"
      A11Y_CHECK: "false"
      SECURITY_CHECK: "false"
      CUCUMBER_FILTER_TAGS: "@Frontend"
    volumes:
      - ./reports:/app/reports
    networks:
      - test-net
    depends_on:
      proxy:
        condition: service_started

networks:
  test-net:
