name: Playwright acceptance tests (dev)

on:
  workflow_dispatch:

jobs:
  acceptance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run docker tests (dev)
        working-directory: playwright-acceptance-tests
        run: bash scripts/run-docker.sh dev

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-acceptance-reports-dev
          path: playwright-acceptance-tests/reports
          if-no-files-found: warn
