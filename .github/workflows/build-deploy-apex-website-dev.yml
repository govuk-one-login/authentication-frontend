name: Build and deploy Apex website  to Dev
run-name: Deploy Apex website  to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run against"
        type: environment
        required: true

env:
  AWS_REGION: eu-west-2
  GH_ACTIONS_ROLE_ARN: arn:aws:iam::975050272416:role/dev-apex-website-pipeline-GitHubActionsRole-jH9ilnuKPKwj
  APEX_ARTIFACT_BUCKET: dev-apex-website-pipeline-githubartifactsourcebuck-m2rvkmwdqqzn
  SIGNING_PROFILE_NAME: SigningProfile_bdzyxbYzrSD8

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up SAM cli
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v2
        with:
          use-installer: true
          version: 1.159.1

      - name: Set up AWS creds
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.GH_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inline CloudFront function code
        run: |
          ./scripts/inline-cloudfront-functions.sh
          mv cloudformation/apex-website/apex-cloudfront-built.yaml cloudformation/apex-website/apex-cloudfront.yaml

      - name: Build copier Lambda
        run: |
          zip -j apex-website/lambda-functions/copier_lambda.zip apex-website/lambda-functions/copier_lambda.py

      - name: Zip govuk frontend and inject checksum
        working-directory: apex-website
        run: |
          echo "::group::Zip govuk frontend artifacts"
          zip -r govukfrontend.zip govuk-frontend/ env-config/ robots.txt
          echo "::endgroup::"

          echo "::group::Inject artifact checksum into CloudFormation template"
          CHECKSUM=$(sha256sum govukfrontend.zip | cut -d' ' -f1)
          echo "Checksum: ${CHECKSUM}"
          sed -i "s/ArtifactVersion: \"initial\"/ArtifactVersion: \"${CHECKSUM}\"/" \
            ../cloudformation/apex-website/apex-cloudfront.yaml
          grep -n "ArtifactVersion" ../cloudformation/apex-website/apex-cloudfront.yaml
          echo "::endgroup::"

      - name: SAM build Apex website template
        run: |
          sam validate --lint -t cloudformation/apex-website/apex-cloudfront.yaml
          sam build --parallel -t cloudformation/apex-website/apex-cloudfront.yaml

      - name: Upload govuk frontend artifact to S3
        working-directory: apex-website
        env:
          ARTIFACT_BUCKET: ${{ env.APEX_ARTIFACT_BUCKET }}
        run: |
          echo "::group::Upload final artifact to S3"
          OBJECT_VERSION="$(aws s3api put-object \
            --bucket "${ARTIFACT_BUCKET}" \
            --key govukfrontend.zip \
            --body govukfrontend.zip \
            --query VersionId --output text)"
          echo "::endgroup::"
          echo "::notice title=Final artifact uploaded to S3::object: govukfrontend.zip, version: $OBJECT_VERSION"

      - name: Extract PR number and commit message
        id: version_info
        run: |
          HEAD_MESSAGE=$(git log -1 --format=%s)
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "$HEAD_MESSAGE" =~ \(#([0-9]+)\) ]]; then
            VERSION="#${BASH_REMATCH[1]} - ${HEAD_MESSAGE}"
          else
            VERSION="${SHORT_SHA}${HEAD_MESSAGE:+: $HEAD_MESSAGE}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Deploy SAM app
        uses: govuk-one-login/devplatform-upload-action@64e46134b4108ebfa1cf2a64fee00782f8e2e8cf # v4.1.0
        with:
          artifact-bucket-name: ${{ env.APEX_ARTIFACT_BUCKET }}
          signing-profile-name: ${{ env.SIGNING_PROFILE_NAME }}
          working-directory: .aws-sam/build
          version: ${{ steps.version_info.outputs.version }}
