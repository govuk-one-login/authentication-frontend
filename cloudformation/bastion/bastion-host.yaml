AWSTemplateFormatVersion: "2010-09-09"
Description: "Minimal bastion host for SSM tunneling to private APIs"

Parameters:
  VpcStackName:
    Type: String
    Description: Name of the VPC stack to import values from
    Default: vpc

  InstanceType:
    Type: String
    Default: t4g.micro
    AllowedValues: [t4g.micro, t4g.small, t4g.medium]
    Description: EC2 instance type (ARM-based)

Resources:
  # IAM Role for SSM access
  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-SSMRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-SSMRole"

  # Instance Profile
  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-SSMInstanceProfile"
      Roles:
        - !Ref SSMRole

  # Security Group
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${AWS::StackName}-bastion-sg"
      GroupDescription: Security group for SSM bastion host
      VpcId:
        Fn::ImportValue: !Sub "${VpcStackName}-VpcId"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-bastion-sg"

  # Bastion Host Instance
  BastionInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0a3a2f225ee59368f # Amazon Linux 2023 ARM64
      InstanceType: !Ref InstanceType
      SubnetId:
        Fn::ImportValue: !Sub "${VpcStackName}-PrivateSubnetIdA"
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      IamInstanceProfile: !Ref SSMInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent nginx amazon-cloudwatch-agent
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

          # Configure CloudWatch Agent
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << 'EOF'
          {
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/nginx/access.log",
                      "log_group_name": "${AWS::StackName}-nginx-access",
                      "log_stream_name": "{instance_id}"
                    },
                    {
                      "file_path": "/var/log/messages",
                      "log_group_name": "${AWS::StackName}-system",
                      "log_stream_name": "{instance_id}"
                    }
                  ]
                }
              }
            }
          }
          EOF

          # Start CloudWatch Agent
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s

          # Configure nginx reverse proxy for Frontend API
          cat > /etc/nginx/conf.d/frontend-api-proxy.conf << 'EOF'
          server {
              listen 80;
              server_name _;

              # Debug request details
              add_header X-Debug-Host $host;
              add_header X-Debug-Uri $request_uri;

              location / {
                  # Add stage name to request path
                  rewrite ^/(.*) /authdev2/$1 break;

                  # Set proper API Gateway Host header for routing
                  proxy_set_header Host nw0dah7bxk.execute-api.eu-west-2.amazonaws.com;

                  # Proxy to VPC endpoint
                  proxy_pass https://nw0dah7bxk.vpce-0b907325ae3bfe3ce.execute-api.eu-west-2.amazonaws.com;

                  # Forward all headers
                  proxy_set_header Authorization $http_authorization;
                  proxy_set_header X-API-Key $http_x_api_key;
                  proxy_set_header Session-Id $http_session_id;
                  proxy_set_header Client-Session-Id $http_client_session_id;
                  proxy_set_header di-persistent-session-id $http_di_persistent_session_id;
                  proxy_set_header Reauthenticate $http_reauthenticate;
                  proxy_set_header User-Language $http_user_language;
                  proxy_pass_request_headers on;

                  # Add additional headers for debugging
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Original-URI $request_uri;

                  # SSL verification settings for connecting to VPC endpoint
                  proxy_ssl_verify off;
              }
          }
          EOF

          systemctl enable nginx
          systemctl start nginx
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-SSM-Bastion"
        - Key: Purpose
          Value: SSM-Tunneling

Outputs:
  BastionInstanceId:
    Description: Instance ID of the bastion host
    Value: !Ref BastionInstance
    Export:
      Name: !Sub "${AWS::StackName}-BastionInstanceId"

  SecurityGroupId:
    Description: Security Group ID of the bastion host
    Value: !Ref BastionSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-SecurityGroupId"

  UsageInstructions:
    Description: How to use this bastion host
    Value: !Sub 'export BASTION_INSTANCE_ID="${BastionInstance}"'

  CloudWatchLogGroups:
    Description: CloudWatch log groups for monitoring
    Value: !Sub "${AWS::StackName}-nginx-access, ${AWS::StackName}-system"
